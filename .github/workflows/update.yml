name: Update LoL calendars

on:
  schedule:
    - cron: "53 * * * *"    # 兜底：主触发由 Cloudflare Worker 走 workflow_dispatch 负责（见 cron-worker/），schedule 会被 GitHub 大量丢弃，仅作后备
  workflow_dispatch: {}      # 支持手动触发

permissions:
  contents: write            # 提交刷新后的 dist/
  pages: write               # 部署到 GitHub Pages
  id-token: write            # deploy-pages 走 OIDC 需要

concurrency:
  group: update-calendars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # 用 GitHub Actions 部署 Pages，绕开会偶发挂掉的 legacy 分支构建管线
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # main.py 抓取失败会非 0 退出，下面的提交/部署都不会跑，已订阅文件保持上一份成功部署
      - name: Generate .ics
        run: python src/main.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dist)" ]; then
            git add dist
            git commit -m "chore: update schedules ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi

      # configure-pages 会把仓库 Pages 源从 legacy 分支构建切成 GitHub Actions
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 只发布对外内容，排除 VCS/开发文件；保持 dist/、en/、ko/ 等 URL 路径不变
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='_site' \
            --exclude='src' \
            --exclude='cron-worker' \
            --exclude='ruff.toml' \
            --exclude='CLAUDE.md' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
