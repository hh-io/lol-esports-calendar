name: Update LoL calendars

on:
  schedule:
    - cron: "53 * * * *"    # 兜底：主触发由 Cloudflare Worker 走 workflow_dispatch 负责（见 cron-worker/），schedule 会被 GitHub 大量丢弃，仅作后备
  workflow_dispatch: {}      # 支持手动触发

permissions:
  contents: write

concurrency:
  group: update-calendars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate .ics
        run: python src/main.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dist)" ]; then
            git add dist
            git commit -m "chore: update schedules ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi
